# Probability of assigning EYEBROWS / FACIAL_HAIR per furry race.
# For most furry races the EYEBROWS slot is repurposed as earrings —
# only a fraction of NPCs get them. For ungulates, EYEBROWS = antlers/
# horns and FACIAL_HAIR is a distinctive feature. Rolls are
# deterministic per NPC. Use race = "*" to set a default that applies
# to every furry race unless overridden by a more specific entry.
# Lookup order: (race, sex, type) > (race, *, type) > ("*", sex, type)
# > ("*", *, type) > 1.0.
headpart_probability = [
  # Default for every furry race: earring slot is a 30% roll, no beards.
  {race = "*"                                  , EYEBROWS = 0.3, FACIAL_HAIR = 0.0},
  # Ungulates: eyebrows are horns/antlers, facial hair is a feature.
  {race = "BDMinoRace"         , sex = "Male"  , EYEBROWS = 1.0, FACIAL_HAIR = 0.5},
  {race = "BDMinoRace"         , sex = "Female", EYEBROWS = 0.5, FACIAL_HAIR = 0.0},
  {race = "BDMinoRaceVampire"  , sex = "Male"  , EYEBROWS = 1.0, FACIAL_HAIR = 0.3},
  {race = "BDMinoRaceVampire"  , sex = "Female", EYEBROWS = 0.5, FACIAL_HAIR = 0.0},
  {race = "BDDeerRace"         , sex = "Male"  , EYEBROWS = 1.0, FACIAL_HAIR = 0.2},
  {race = "BDDeerRace"         , sex = "Female", EYEBROWS = 0.5, FACIAL_HAIR = 0.0},
]

