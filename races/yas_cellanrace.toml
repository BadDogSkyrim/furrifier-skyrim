  {vanilla = "FemaleEyesHumanBrown"      , furry = "FemaleEyesCellanBrown"},
  {vanilla = "FemaleEyesHumanYellow"     , furry = "FemaleEyesCellanYellow"},
  {vanilla = "FemaleEyesHumanVampire"    , furry = "FemaleEyesCellanVampire"},
  {vanilla = "MaleEyesHumanLightBlue"    , furry = "MaleEyesCellanBlue"},
  {vanilla = "MaleEyesHumanBrown"        , furry = "MaleEyesCellanBrown"},
  {vanilla = "MaleEyesHumanYellow"       , furry = "MaleEyesCellanYellow"},
  {vanilla = "MaleEyesHumanVampire"      , furry = "MaleEyesCellanVampire"},
]

