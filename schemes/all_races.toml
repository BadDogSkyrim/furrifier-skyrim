# Leveled NPC list extension. Adds occasional duplicates of vanilla
# NPCs into LVLN leveled lists so furry races without a direct vanilla
# pairing (Cellan, Vaalsark, Deer, Horse, Bagha) show up at low rates
# in random encounters. See README.md, "How leveled-NPC extension
# works." Listed races should NOT be ones already directly paired in
# the `races = [...]` table above — those NPCs already appear with
# their furry race in every leveled list by default.
[leveled_npcs]
exclude_substrings = ["LCharOrc", "Thalmor", "Alikir", "Forsworn"]

[[leveled_npcs.groups]]
match_substrings = ["bandit"]
races = [
  {race = "BDMinoRace", probability = 0.10},
  {race = "BDDeerRace"  , probability = 0.01},
  {race = "BDHorseRace"  , probability = 0.10},
  {race = "YASVaalsarkRace"  , probability = 0.10},
  {race = "CellanRace"  , probability = 0.01},
  {race = "YASBaghaRace"  , probability = 0.10},
  {race = "YASShanRace"  , probability = 0.05},
]

[[leveled_npcs.groups]]
match_substrings = ["warlock", "necromancer"]
races = [
  {race = "BDMinoRace", probability = 0.01},
  {race = "BDDeerRace"  , probability = 0.20},
  {race = "BDHorseRace"  , probability = 0.10},
  {race = "YASVaalsarkRace"  , probability = 0.20},
  {race = "CellanRace"  , probability = 0.01},
  {race = "YASBaghaRace"  , probability = 0.10},
  {race = "YASShanRace"  , probability = 0.05},
]

[[leveled_npcs.groups]]
races = [
  {race = "BDMinoRace", probability = 0.10},
  {race = "BDDeerRace"  , probability = 0.10},
  {race = "BDHorseRace"  , probability = 0.10},
  {race = "YASVaalsarkRace"  , probability = 0.10},
  {race = "CellanRace"  , probability = 0.05},
  {race = "YASBaghaRace"  , probability = 0.10},
  {race = "YASShanRace"  , probability = 0.05},
]
