# Furrifier race scheme: all_races
# Pure vanilla->furry assignment data. Headpart equivalents
# and labels live in ../races/*.toml and apply to every scheme.

# Vanilla race -> furry race.
races = [
  {vanilla = "NordRace"              , furry = "YASLykaiosRace"},
  {vanilla = "NordRaceVampire"       , furry = "YASLykaiosRaceVampire"},
  {vanilla = "NordRaceChild"         , furry = "YASLykaiosRaceChild"},
  {vanilla = "DLC1NordRace"          , furry = "YASLykaiosRace"},
  {vanilla = "NordRaceAstrid"        , furry = "YASLykaiosRace"},
  {vanilla = "ElderRace"             , furry = "YASLykaiosRace"},
  {vanilla = "ElderRaceVampire"      , furry = "YASLykaiosRaceVampire"},
  {vanilla = "ImperialRace"          , furry = "YASKettuRace"},
  {vanilla = "ImperialRaceChild"     , furry = "YASKettuRaceChild"},
  {vanilla = "ImperialRaceVampire"   , furry = "YASKettuRaceVampire"},
  {vanilla = "BretonRace"            , furry = "YASKygarraRace"},
